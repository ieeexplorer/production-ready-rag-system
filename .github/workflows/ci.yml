name: CI

on:
  push:
    branches:
      - main
      - production-hardening-strategy
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "from api.main import app"
          python -c "from rag.pipeline import answer_question"

      - name: Run tests
        run: pytest
